server:
  port: 8082

management:
  endpoint:
    health:
      show-details: always

# Validate access tokens from user-service via JWKS (RS256). Start user-service first, or set URLs for your deployment.
spring:
  application:
    name: todo-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8081}
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:8081/.well-known/jwks.json}

  datasource:
    # stringtype=unspecified lets the server coerce string parameters to enum columns (e.g. task_status)
    url: jdbc:postgresql://localhost:5432/app_todo_db?stringtype=unspecified
    username: app_todo_db_user
    password: secret
    driver-class-name: org.postgresql.Driver
